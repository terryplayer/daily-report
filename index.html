<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌀 小十三的智能管理系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
  background:#0d1117;color:#e6edf3;padding:32px 20px;min-height:100vh
}
.container{max-width:800px;margin:0 auto}

/* ─── 顶栏 ─── */
.header{
  text-align:center;padding:28px 0 20px;
  border-bottom:1px solid #21262d;margin-bottom:24px
}
.header h1{
  font-size:20px;font-weight:700;color:#e6edf3;letter-spacing:0.5px;
  display:flex;align-items:center;justify-content:center;gap:8px
}
.header .subtitle{
  font-size:12px;color:#8b949e;margin-top:6px;
  display:flex;align-items:center;justify-content:center;gap:4px
}

/* ─── 板块网格 ─── */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
@media(max-width:560px){.grid{grid-template-columns:1fr}}

/* ─── 父卡片（七色光谱顶边渐变） ─── */
.card{
  background:#161b22;border-radius:8px;border:1px solid #30363d;
  overflow:hidden;position:relative;padding-top:4px
}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px}

.card-study::before{background:linear-gradient(90deg,#f85149,#f0883e)}
.card-stock::before{background:linear-gradient(90deg,#d29922,#3fb950)}
.card-work::before{background:linear-gradient(90deg,#56d4dd,#58a6ff)}
.card-tool::before{background:linear-gradient(90deg,#58a6ff,#bc8cff)}

.card-header{
  padding:14px 16px 10px;display:flex;align-items:center;gap:8px;
  font-size:15px;font-weight:600;color:#e6edf3
}
.card-header .icon{font-size:18px}

/* ─── 子卡片 4x1 网格 ─── */
.sub-grid{
  display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;
  padding:0 12px 12px
}
@media(max-width:560px){.sub-grid{grid-template-columns:1fr 1fr}}

.sub-card{
  background:#0d1117;border-radius:6px;border:1px solid #21262d;
  padding:6px 8px 10px;text-align:center;text-decoration:none;position:relative;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  transition:border-color 0.15s,background 0.15s
}
.sub-card:hover{background:#1c2333}
.sub-card .sub-icon{font-size:16px}
.sub-card .sub-label{font-size:11px;color:#8b949e;line-height:1.3}

/* 有真实链接的子卡片：顶部渐变色条 */
.sub-card.link-active::before{content:'';position:absolute;top:0;left:4px;right:4px;height:2px;border-radius:0 0 2px 2px}
.sub-card.link-active:hover{border-color:#30363d;background:#1c2333}
.sub-card.link-active .sub-label{color:#e6edf3}

.sub-card.link-blue::before{background:linear-gradient(90deg,#58a6ff,#56d4dd)}
.sub-card.link-blue .sub-label{color:#58a6ff}

.sub-card.link-gold::before{background:linear-gradient(90deg,#d29922,#f0c27a)}
.sub-card.link-gold .sub-label{color:#d29922}

/* ─── 底部 ─── */
.footer{text-align:center;color:#30363d;font-size:12px;padding-top:20px;border-top:1px solid #21262d;line-height:2}
.footer a{color:#58a6ff;text-decoration:none;font-size:12px}
.footer a:hover{text-decoration:underline}

/* ─── 欢迎语横幅 ─── */
.welcome{
  background:#161b22;border:1px solid #30363d;border-radius:8px;
  padding:12px 20px;margin-bottom:20px;
  display:flex;align-items:center;gap:10px;font-size:13px;color:#8b949e
}
.welcome .time{color:#30363d;font-size:12px}
</style>
</head>
<body>
<div class="container">

<div class="header">
  <h1>🌀 小十三的智能管理系统</h1>
  <div class="subtitle">学习 · 股票 · 工作 · 工具</div>
</div>

<div class="welcome" id="welcomeBanner">
  <span style="font-size:16px">👋</span>
  <span id="greetingText">十三哥，早上好！</span>
  <span style="color:#8b949e" id="todayDate">--</span>
  <span class="time" id="todayTime" style="margin-left:auto"></span>
</div>

<div class="grid">

<!-- 📚 学习 — 红橙 -->
<div class="card card-study">
  <div class="card-header"><span class="icon">📚</span> 学习</div>
  <div class="sub-grid">
    <a href="#" class="sub-card"><span class="sub-icon">📖</span><span class="sub-label">知识笔记</span></a>
    <a href="#" class="sub-card"><span class="sub-icon">🎓</span><span class="sub-label">学习目标</span></a>
    <a href="#" class="sub-card"><span class="sub-icon">📝</span><span class="sub-label">测验考试</span></a>
    <a href="#" class="sub-card"><span class="sub-icon">🎬</span><span class="sub-label">TED推荐</span></a>
  </div>
</div>

<!-- 📈 股票 — 黄绿 -->
<div class="card card-stock">
  <div class="card-header"><span class="icon">📈</span> 股票</div>
  <div class="sub-grid">
    <a href="/dashboard" class="sub-card link-active link-blue"><span class="sub-icon">📊</span><span class="sub-label">报告中心</span></a>
    <a href="http://8.137.53.96:8000" class="sub-card link-active link-gold"><span class="sub-icon">🔍</span><span class="sub-label">市场全景</span></a>
    <a href="#" class="sub-card"><span class="sub-icon">📋</span><span class="sub-label">持仓看板</span></a>
    <a href="#" class="sub-card"><span class="sub-icon">📈</span><span class="sub-label">复盘策略</span></a>
  </div>
</div>

<!-- 💼 工作 — 青蓝 -->
<div class="card card-work">
  <div class="card-header"><span class="icon">💼</span> 工作</div>
  <div class="sub-grid">
    <a href="#" class="sub-card"><span class="sub-icon">📅</span><span class="sub-label">日程任务</span></a>
    <a href="#" class="sub-card"><span class="sub-icon">💻</span><span class="sub-label">项目看板</span></a>
    <a href="#" class="sub-card"><span class="sub-icon">🤖</span><span class="sub-label">AI工具箱</span></a>
    <a href="#" class="sub-card"><span class="sub-icon">⏰</span><span class="sub-label">定时任务</span></a>
  </div>
</div>

<!-- 🔧 工具 — 蓝紫 -->
<div class="card card-tool">
  <div class="card-header"><span class="icon">🔧</span> 工具</div>
  <div class="sub-grid">
    <a href="#" class="sub-card"><span class="sub-icon">🌐</span><span class="sub-label">常用链接</span></a>
    <a href="#" class="sub-card"><span class="sub-icon">🐍</span><span class="sub-label">开发环境</span></a>
    <a href="#" class="sub-card"><span class="sub-icon">📡</span><span class="sub-label">数据服务</span></a>
    <a href="#" class="sub-card"><span class="sub-icon">⚙️</span><span class="sub-label">系统状态</span></a>
  </div>
</div>

</div>

<div class="footer">
🌀 小十三的智能管理系统 · <a href="/dashboard">报告中心</a> · <a href="https://github.com/terryplayer/daily-report">GitHub</a>
</div>

</div>

<script>
(function(){
  var now=new Date();
  var y=now.getFullYear(),m=('0'+(now.getMonth()+1)).slice(-2),d=('0'+now.getDate()).slice(-2);
  var weekdays=['日','一','二','三','四','五','六'];
  var wd=weekdays[now.getDay()];
  document.getElementById('todayDate').textContent=y+'-'+m+'-'+d+' 周'+wd;

  var h=now.getHours(),mi=('0'+now.getMinutes()).slice(-2);
  var greet='晚上好';
  if(h<6)greet='夜深了';else if(h<9)greet='早上好';else if(h<12)greet='上午好';
  else if(h<14)greet='中午好';else if(h<18)greet='下午好';
  document.getElementById('greetingText').textContent='十三哥，'+greet+'！';
  document.getElementById('todayTime').textContent=h+':'+mi;
})();
</script>
</body>
</html>
