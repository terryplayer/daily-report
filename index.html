<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌀 小十三 · 每日简报</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #0d1117;
  color: #e6edf3;
  padding: 48px 20px;
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse at 50% 0%, rgba(88,166,255,0.06) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 30%, rgba(191,143,246,0.04) 0%, transparent 50%);
}

.container { max-width: 580px; margin: 0 auto; }

/* ===== HEADER ===== */
.header {
  text-align: center;
  margin-bottom: 36px;
}
.header h1 {
  font-size: 28px;
  font-weight: 700;
  background: linear-gradient(135deg, #58a6ff, #bc8cff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 1px;
}
.header .subtitle {
  color: #8b949e;
  font-size: 13px;
  margin-top: 6px;
  letter-spacing: 2px;
}
.header .divider {
  width: 40px;
  height: 3px;
  background: linear-gradient(90deg, #58a6ff, #bc8cff);
  border-radius: 2px;
  margin: 14px auto 0;
}

/* ===== CARDS ===== */
.card {
  background: linear-gradient(135deg, #161b22 0%, #1a1f2a 100%);
  border: 1px solid #21262d;
  border-radius: 12px;
  padding: 20px 24px;
  margin-bottom: 14px;
  transition: border-color .3s, transform .2s, box-shadow .3s;
}
.card:hover {
  border-color: #30363d;
  box-shadow: 0 4px 24px rgba(0,0,0,0.3);
}

.card.highlight {
  border-color: rgba(88,166,255,0.3);
  background: linear-gradient(135deg, #161b22 0%, #1a2035 100%);
  box-shadow: 0 0 24px rgba(88,166,255,0.05);
}
.card.highlight:hover {
  border-color: rgba(88,166,255,0.5);
  box-shadow: 0 4px 24px rgba(88,166,255,0.08);
}

.section-title {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-title.weekly { background: linear-gradient(135deg, #bc8cff, #79c0ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.section-title.today { background: linear-gradient(135deg, #58a6ff, #79c0ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.section-title.date { color: #d29922; }
.section-title.date2 { color: #3fb950; }
.section-title.date3 { color: #f0883e; }
.section-title.date4 { color: #8b949e; }

/* ===== WEEKLY REVIEW ===== */
.weekly-list { list-style: none; }
.weekly-list li { border-bottom: 1px solid #21262d; }
.weekly-list li:last-child { border-bottom: none; }
.weekly-list li a {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 8px;
  color: #e6edf3;
  text-decoration: none;
  border-radius: 8px;
  transition: background .2s;
}
.weekly-list li a:hover { background: rgba(255,255,255,0.04); }
.weekly-list .label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 14px;
}
.weekly-list .badge {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 6px;
  font-weight: 500;
}
.badge-primary { background: rgba(88,166,255,0.12); color: #58a6ff; border: 1px solid rgba(88,166,255,0.2); }
.badge-secondary { background: rgba(139,148,158,0.1); color: #8b949e; border: 1px solid rgba(139,148,158,0.15); }
.weekly-list .arrow { font-size: 13px; color: #484f58; transition: color .2s; }
.weekly-list li a:hover .arrow { color: #8b949e; }

/* ===== DATE CARDS ===== */
.date-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.date-header .title-wrap {
  display: flex;
  align-items: center;
  gap: 6px;
}
.date-header .title {
  font-size: 15px;
  font-weight: 600;
}
.date-header .day { font-weight: 400; color: #8b949e; }
.tag {
  font-size: 11px;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 6px;
}
.tag-today {
  background: rgba(88,166,255,0.12);
  color: #58a6ff;
  border: 1px solid rgba(88,166,255,0.25);
}
.tag-weekend {
  background: rgba(247,153,57,0.1);
  color: #f79939;
  border: 1px solid rgba(247,153,57,0.2);
}

/* report buttons */
.report-links { display: flex; gap: 8px; flex-wrap: wrap; }
.report-links a {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  font-weight: 500;
  text-decoration: none;
  padding: 8px 14px;
  border-radius: 8px;
  transition: all .25s;
  border: 1px solid #21262d;
  background: rgba(255,255,255,0.02);
}
.report-links a:hover {
  transform: translateY(-1px);
}
.report-links a.pm {
  color: #d29922;
  border-color: rgba(210,153,34,0.2);
  background: rgba(210,153,34,0.04);
}
.report-links a.pm:hover {
  background: rgba(210,153,34,0.1);
  border-color: rgba(210,153,34,0.35);
  box-shadow: 0 2px 12px rgba(210,153,34,0.08);
}
.report-links a.dc {
  color: #3fb950;
  border-color: rgba(63,185,80,0.2);
  background: rgba(63,185,80,0.04);
}
.report-links a.dc:hover {
  background: rgba(63,185,80,0.1);
  border-color: rgba(63,185,80,0.35);
  box-shadow: 0 2px 12px rgba(63,185,80,0.08);
}
.report-links a.wr {
  color: #bc8cff;
  border-color: rgba(188,140,255,0.2);
  background: rgba(188,140,255,0.04);
}
.report-links a.wr:hover {
  background: rgba(188,140,255,0.1);
  border-color: rgba(188,140,255,0.35);
  box-shadow: 0 2px 12px rgba(188,140,255,0.08);
}

/* ===== FOOTER ===== */
.footer {
  text-align: center;
  color: #484f58;
  font-size: 12px;
  margin-top: 32px;
  padding-top: 16px;
  border-top: 1px solid #21262d;
  line-height: 1.8;
}
.footer a { color: #484f58; text-decoration: none; transition: color .2s; }
.footer a:hover { color: #8b949e; }
.footer .dot { margin: 0 6px; }
</style>
</head>
