<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌀 小十三 · 股市简报</title><style>* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system,"PingFang SC","Microsoft YaHei",sans-serif; background:#0d1117; color:#e6edf3; padding:40px 20px; }
.container { max-width:600px; margin:0 auto; }
h1 { color:#58a6ff; font-size:26px; margin-bottom:4px; display:flex; align-items:center; gap:10px; letter-spacing:0.5px; }
.subtitle { color:#8b949e; font-size:13px; margin-bottom:20px; }
.card { background:#161b22; border:1px solid #30363d; border-radius:8px; padding:16px 20px; margin-bottom:14px; }
.card h2 { font-size:18px; font-weight:700; margin-bottom:12px; display:flex; align-items:center; gap:8px; border-bottom:1px solid #21262d; padding-bottom:8px; }
.card-hdr-weekly { color:#f778ba; }
.card-hdr-daily { color:#56d4dd; }
.card h2 .badge { font-size:11px; background:#1f6feb; color:#fff; padding:1px 8px; border-radius:8px; font-weight:400; }

/* ═══ 周分组头 ═══ */
.week-header { font-size:16px; font-weight:700; padding:14px 0 6px 10px; margin:8px 0 0 0; display:flex; align-items:center; gap:8px; border-bottom:1px solid #30363d; letter-spacing:0.5px; }
.week-header:first-of-type { padding-top:0; margin-top:0; }
.week-header .week-tag { font-size:10px; border:1px solid; padding:1px 8px; border-radius:4px; font-weight:600; }

/* 每周不同颜色的周标题 */
.week-hdr-w1 { color:#d9a52e; }
.week-hdr-w1 .week-tag { background:rgba(217,165,46,0.12); color:#d9a52e; border-color:rgba(217,165,46,0.3); }

.week-hdr-w2 { color:#8b949e; }
.week-hdr-w2 .week-tag { background:rgba(139,148,158,0.12); color:#8b949e; border-color:rgba(139,148,158,0.3); }

/* ═══ 日期分组（缩进于周标题下） ═══ */
.date-group { padding:8px 10px; border-bottom:1px solid #21262d; border-left:3px solid transparent; border-radius:6px; transition:all .2s; margin-bottom:4px; }
.date-group:last-child { border-bottom:none; margin-bottom:0; }
.date-group:first-of-type { padding-top:8px; }
.date-group:hover { background:#21262d; }
.day-mon { border-left-color:#f85149; }
.day-tue { border-left-color:#f0883e; }
.day-wed { border-left-color:#58a6ff; }
.day-thu { border-left-color:#3fb950; }
.day-fri { border-left-color:#bf77f6; }
.date-label { font-size:14px; font-weight:600; margin-bottom:6px; display:flex; align-items:center; gap:8px; }
.day-mon .date-label { color:#f85149; }
.day-tue .date-label { color:#f0883e; }
.day-wed .date-label { color:#58a6ff; }
.day-thu .date-label { color:#3fb950; }
.day-fri .date-label { color:#bf77f6; }
.date-label .day-tag { font-size:11px; font-weight:500; padding:1px 8px; border-radius:4px; border:1px solid; background:transparent; }
.day-empty .date-label::after { content:"暂无数据"; font-size:12px; color:#30363d; font-weight:400; margin-left:8px; }
.day-mon .day-tag { color:#f85149; border-color:rgba(248,81,73,0.3); }
.day-tue .day-tag { color:#f0883e; border-color:rgba(240,136,62,0.3); }
.day-wed .day-tag { color:#58a6ff; border-color:rgba(88,166,255,0.3); }
.day-thu .day-tag { color:#3fb950; border-color:rgba(63,185,80,0.3); }
.day-fri .day-tag { color:#bf77f6; border-color:rgba(191,119,246,0.3); }
.tag-today { background:#1f6feb22 !important; color:#58a6ff !important; border:1px solid #1f6feb44; }
.report-links { display:flex; gap:8px; flex-wrap:wrap; }
.report-links a { display:inline-flex; align-items:center; gap:4px; font-size:13px; color:#8b949e; text-decoration:none; padding:5px 10px; border-radius:6px; transition:all .2s; border:1px solid #21262d; }
.report-links a:hover { color:#f0f6fc; background:#21262d; border-color:#30363d; }
.report-links a.pm { color:#d29922; }
.report-links a.pm:hover { background:#d2992211; border-color:#d2992244; }
.report-links a.dc { color:#3fb950; }
.report-links a.dc:hover { background:#3fb95011; border-color:#3fb95044; }
.report-links a.wr { color:#bc8cff; }
.report-links a.wr:hover { background:#bc8cff11; border-color:#bc8cff44; }
.report-links a.mid { color:#58a6ff; }
.report-links a.mid:hover { background:#58a6ff11; border-color:#58a6ff44; }
.report-links a.we { color:#bf77f6; }
.report-links a.we:hover { background:#bf77f611; border-color:#bf77f644; }
.weekly-row { padding:0; border-bottom:1px solid #21262d; }
.weekly-row:last-child { border-bottom:none; }
.weekly-row a { display:flex; justify-content:space-between; align-items:center; padding:10px 10px; font-size:14px; color:#e6edf3; text-decoration:none; border-radius:6px; transition:all .2s; border-left:3px solid transparent; margin:4px 0; }
.weekly-row a:hover { background:#21262d; }
.weekly-row .version { font-size:12px; color:#8b949e; font-weight:400; }
.weekly-row .date-text { font-weight:600; }

/* 周报链接中日期 + 星期 tag */
.weekly-row .day-tag-sm { font-size:11px; color:#8b949e; font-weight:400; }

/* 每周不同颜色 - 最新在前 */
.weekly-w1 a { border-left-color:#f85149; }
.weekly-w1 a .date-text { color:#f85149; font-weight:600; }
.weekly-w1 a:hover { background:rgba(248,81,73,0.08); }

.weekly-w2 a { border-left-color:#d9a52e; }
.weekly-w2 a .date-text { color:#d9a52e; font-weight:500; }
.weekly-w2 a:hover { background:rgba(210,153,34,0.08); }
.footer { text-align:center; color:#8b949e; font-size:12px; margin-top:32px; padding-top:16px; border-top:1px solid #21262d; line-height:2; }</style></head><body><div class="container">
