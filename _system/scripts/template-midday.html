<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌤 午间监测 | {{DATE}} {{WEEKDAY}}</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: #0d1117; color: #e6edf3; padding: 20px; line-height: 1.6; }
.container { max-width: 860px; margin: 0 auto; }
.header { border-bottom: 2px solid #56d4dd; padding-bottom: 16px; margin-bottom: 24px; }
.header h1 { font-size: 22px; color: #56d4dd; }
.header .date { color: #8b949e; font-size: 13px; margin-top: 4px; }
.section { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px 20px; margin-bottom: 16px; }
.section h2 { font-size: 15px; color: #56d4dd; margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid #21262d; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th, td { padding: 6px 8px; text-align: left; border-bottom: 1px solid #21262d; }
th { color: #8b949e; font-weight: 500; font-size: 12px; }
.up { color: #f85149; }
.down { color: #3fb950; }
.flat { color: #d9a52e; }
.tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-right: 4px; }
.tag-aplus { background: rgba(248,81,73,0.15); color: #f85149; }
.tag-a { background: rgba(210,153,34,0.15); color: #d9a52e; }
.tag-b { background: rgba(86,212,221,0.15); color: #56d4dd; }
.tag-c { background: rgba(139,148,158,0.15); color: #8b949e; }
.tag-d { background: rgba(63,185,80,0.15); color: #3fb950; }
.footer { text-align: center; color: #8b949e; font-size: 12px; padding: 20px 0; border-top: 1px solid #21262d; margin-top: 24px; }
.stock-card { padding: 10px 12px; border: 1px solid #30363d; border-radius: 6px; margin-bottom: 8px; }
.stock-name { font-size: 14px; font-weight: 600; }
.stock-code { color: #8b949e; font-size: 11px; }
.stock-price { font-size: 16px; font-weight: 700; margin: 4px 0; }
.stock-detail { color: #8b949e; font-size: 12px; margin-top: 2px; }
.sector-title { font-size: 14px; font-weight: 600; color: #56d4dd; margin: 14px 0 8px; padding-bottom: 4px; border-bottom: 1px solid #21262d; }
.alert-item { padding: 6px 0; border-bottom: 1px solid #21262d; font-size: 13px; }
.alert-item:last-child { border-bottom: none; }
.signal { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 11px; font-weight: 600; margin: 2px 2px 0 0; }
.signal-add { background: rgba(248,81,73,0.18); color: #f85149; }
.signal-hold { background: rgba(86,212,221,0.15); color: #56d4dd; }
.signal-cut { background: rgba(63,185,80,0.15); color: #3fb950; }
.badge { display: inline-flex; align-items: center; gap: 2px; font-size: 11px; font-weight: 600; padding: 1px 6px; border-radius: 8px; }
.badge-red { background: rgba(248,81,73,0.12); color: #f85149; }
.badge-green { background: rgba(63,185,80,0.12); color: #3fb950; }
.badge-yellow { background: rgba(210,153,34,0.12); color: #d9a52e; }
</style>
</head>
<body>
<div class="container">

<div class="header">
<h1>🌤 午间监测 | {{DATE}} {{WEEKDAY}}</h1>
<div class="date">数据截至 11:30 上午收盘 | 实时行情 API</div>
</div>

<div class="section">
<h2>📊 半日行情回顾</h2>
{{MORNING_REVIEW}}
</div>

<div class="section">
<h2>⚡ 异动提醒（≥5%）</h2>
{{MIDDAY_ALERTS}}
</div>

<div class="section">
<h2>📋 持仓股票午间表现</h2>
{{HOLDINGS_OBSERVATION}}
</div>

<div class="section">
<h2>📐 盘前预判验证</h2>
{{PREDICTION_REVIEW}}
</div>

<div class="footer">
小十三 🌀 · 午间监测 · {{DATE}} {{WEEKDAY}}<br>
数据仅供参考，不构成投资建议 · 市场有风险，投资需谨慎
</div>

</div>
</body>
</html>
